<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
    <defs>
        <style>
            /* 默认亮色模式 */
            .cloud-light { fill: url(#cloudGradientLight); }
            .cross-light { fill: #ffffff; }
            /* 暗色模式切换 */
            @media (prefers-color-scheme: dark) {
                .cloud-light { fill: url(#cloudGradientDark); }
                .cross-light { fill: #e0f0ff; }
            }
        </style>
        
        <linearGradient id="cloudGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4FACFE" />
            <stop offset="100%" stop-color="#00F2FE" />
        </linearGradient>
        
        <linearGradient id="cloudGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#82CFFF" />
            <stop offset="100%" stop-color="#66FFFF" />
        </linearGradient>
    </defs>

    <!-- 云朵形状 -->
    <path class="cloud-light" d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z" />
    
    <!-- 医疗十字 -->
    <rect class="cross-light" x="10" y="6" width="4" height="12" rx="1.5" />
    <rect class="cross-light" x="6" y="10" width="12" height="4" rx="1.5" />
</svg>